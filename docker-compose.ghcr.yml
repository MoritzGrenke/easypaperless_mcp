services:
  easypaperless-mcp:
    image: ghcr.io/moritzgrenke/easypaperless_mcp:latest
    ports:
      - "8000:8000"
    environment:
      MCP_TRANSPORT: streamable-http
      # Optionally lock the target paperless-ngx URL for all clients:
      # PAPERLESS_URL: http://your-paperless-ngx-host:8000
      #
      # Do NOT add PAPERLESS_TOKEN here — the token must be supplied by each
      # MCP client via the X-Paperless-Token request header.
    restart: unless-stopped
